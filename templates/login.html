{% extends "base.html" %}
{% block title %}Ingresar · Consultas SDE{% endblock %}
{% block extra_head %}
<style>
  .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;
       background:linear-gradient(135deg,#1C2443,#0f1530)}
  .login{width:100%;max-width:24.375rem;background:#fff;border-radius:1.25rem;padding:2.375rem 2.125rem;
         box-shadow:0 1.25rem 3.75rem rgba(0,0,0,.35)}
  .login .login-logo{display:block;height:2.5rem;width:auto;margin:0 auto 0.875rem}
  .login .logo{font-size:1.375rem;font-weight:800;color:var(--navy);text-align:center}
  .login .sub{text-align:center;color:var(--muted);font-size:0.8125rem;margin-bottom:1.625rem}
  .login label{display:block;font-size:0.8125rem;font-weight:600;color:var(--navy);margin:0.875rem 0 0.3125rem}
  .login input{width:100%;padding:0.75rem 0.875rem;border:1px solid var(--border);border-radius:0.75rem;font-size:0.9375rem;font-family:inherit}
  .login button{width:100%;margin-top:1.375rem;padding:0.8125rem;background:var(--celeste);color:#fff;border:none;
                border-radius:0.75rem;font-size:0.9375rem;font-weight:700;cursor:pointer;font-family:inherit;transition:filter .15s}
  .login button:hover{filter:brightness(1.05)}
  .err{background:var(--red-bg,#fdecea);color:var(--red);padding:0.625rem 0.875rem;border-radius:0.625rem;font-size:0.8125rem;margin-top:1rem;text-align:center}
</style>
{% endblock %}
{% block body_attrs %} class="login-page"{% endblock %}
{% block body %}
  <form class="login" method="post" action="/login">
    <img src="/static/img/logo-cfi.png" alt="CFI" class="login-logo">
    <div class="logo brand-font">Consultas SDE</div>
    <div class="sub">Seguimiento de consultas — UEP CFI</div>
    <label>Usuario</label>
    <input name="username" autocomplete="username" autofocus required>
    <label>Contraseña</label>
    <input name="password" type="password" autocomplete="current-password" required>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <button type="submit">Ingresar</button>
  </form>
{% endblock %}
