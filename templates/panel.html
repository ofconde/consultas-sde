{% extends "base.html" %}
{% block title %}Panel · Consultas SDE{% endblock %}
{% block body %}
{% include "_topbar.html" %}

  <div class="wrap">
    <div class="kpis" id="kpis"></div>

    <div class="estado-btns" id="ebtns"></div>

    <div class="filtros">
      <input type="search" id="q" placeholder="Buscar por nombre o CUIT…">
      <select id="f-tecnico"><option value="">Todos los técnicos</option><option value="__sin__">— Sin asignar</option></select>
      <select id="f-estado"><option value="">Todos los estados</option></select>
      <select id="f-accion"><option value="">Última acción (todas)</option></select>
      <select id="f-departamento"><option value="">Todos los departamentos</option></select>
      <select id="f-linea"><option value="">Todas las líneas</option></select>
      <select id="f-programa"><option value="">Todos los programas</option></select>
      <select id="f-sector"><option value="">Todos los sectores</option></select>
      <span class="muted" id="cont"></span>
    </div>

    <div class="tabla-wrap card">
      <table>
        <thead><tr>
          <th>Recepción</th><th>Solicitante</th><th>Localidad</th><th>Sector</th>
          <th>Monto</th><th>Línea</th><th>Técnico</th><th>Estado</th><th>Acc.</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No hay consultas para este filtro.</div>
      <div class="pager" id="pager" style="display:none"></div>
    </div>
  </div>
{% endblock %}
{% block scripts %}
<script>
const $ = s => document.querySelector(s);
const ROL = "{{ usuario.rol }}";
let TIMER = null;
const PAGE_SIZE = 60;
const state = { estado: '', mios: false, dups: false, sinAcciones: false, pagina: 1 };
let ROWS = [];
let META = { grupo_color: {} };
let CAT = {};

async function cargarMeta(){ META = await (await fetch('/api/catalogos/estado-grupo')).json(); }

function llenar(sel, valores, placeholder){
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  valores.forEach(v => sel.add(new Option(v, v)));
}

async function cargarCatalogos(){
  CAT = await (await fetch('/api/catalogos')).json();
  llenar($('#f-estado'), CAT.ESTADO||[], 'Todos los estados');
  llenar($('#f-accion'), CAT.ACCION||[], 'Última acción (todas)');
  llenar($('#f-departamento'), CAT.DEPARTAMENTO||[], 'Todos los departamentos');
  llenar($('#f-linea'), CAT.LINEA||[], 'Todas las líneas');
  llenar($('#f-programa'), CAT.PROGRAMA||[], 'Todos los programas');
  // sector NO se llena desde CAT.SECTOR: ese catálogo de referencia (25 rubros detallados)
  // no coincide con los valores reales guardados en los datos (COMERCIAL/SERVICIOS/etc,
  // que vienen tal cual del Excel). Se llena en cargarResumen() con los valores reales.
}

async function cargarResumen(){
  const r = await fetch('/api/informe'); const d = await r.json();

  // sector: valores reales presentes en los datos (no el catálogo de referencia,
  // que usa una taxonomía distinta — ver nota en cargarCatalogos())
  const sectoresReales = (d.sectores||[]).map(s=>s.clave).filter(s=>s && !s.startsWith('(sin'));
  llenar($('#f-sector'), sectoresReales.sort(), 'Todos los sectores');

  $('#kpis').innerHTML = `
    <div class="kpi card clickable" id="kpi-total"><div class="n">${d.total}</div><div class="l">Total consultas</div></div>
    <div class="kpi card accent"><div class="n">${d.activas}</div><div class="l">Activas</div></div>
    <div class="kpi card clickable" id="kpi-sin-asignar"><div class="n">${d.sin_asignar}</div><div class="l">Sin asignar</div></div>
    <div class="kpi card clickable" id="kpi-sin-acciones"><div class="n">${d.sin_acciones}</div><div class="l">Sin acciones</div></div>
    <div class="kpi card"><div class="n">${d.nuevas_semana}</div><div class="l">Nuevas (7 días)</div></div>`;

  $('#kpi-total').addEventListener('click', () => {
    Object.assign(state, { estado:'', mios:false, dups:false, sinAcciones:false });
    $('#q').value=''; $('#f-tecnico').value=''; $('#f-estado').value='';
    $('#f-accion').value=''; $('#f-departamento').value=''; $('#f-linea').value='';
    $('#f-programa').value=''; $('#f-sector').value='';
    pintarBotones(); pintarKpis(); cargarTabla();
  });
  $('#kpi-sin-asignar').addEventListener('click', () => {
    $('#f-tecnico').value = $('#f-tecnico').value === '__sin__' ? '' : '__sin__';
    pintarKpis(); cargarTabla();
  });
  $('#kpi-sin-acciones').addEventListener('click', () => {
    state.sinAcciones = !state.sinAcciones; pintarKpis(); cargarTabla();
  });
  pintarKpis();

  // botones dinámicos: uno por cada estado que exista en los datos (se crean solos)
  let botones = `<button class="ebtn" data-estado=""><span>Todas</span><span class="cnt">${d.total}</span></button>`;
  d.estados.forEach(e => {
    botones += `<button class="ebtn" data-estado="${escapeHtml(e.estado)}">
      <span class="dot" style="background:${META.grupo_color[e.grupo]||'#8891a8'}"></span>
      <span>${escapeHtml(e.estado)}</span><span class="cnt">${e.n}</span></button>`;
  });
  botones += `<button class="ebtn mios" id="btn-mios">Mis casos</button>`;
  if(d.duplicados > 0)
    botones += `<button class="ebtn dups" id="btn-dups">⚠ Duplicados <span class="cnt">${d.duplicados}</span></button>`;
  $('#ebtns').innerHTML = botones;

  $('#ebtns').querySelectorAll('.ebtn[data-estado]').forEach(b => {
    b.addEventListener('click', () => {
      state.estado = b.dataset.estado; state.dups = false;
      $('#f-estado').value = state.estado;
      pintarBotones(); cargarTabla();
    });
  });
  $('#btn-mios').addEventListener('click', () => {
    state.mios = !state.mios; state.dups = false; pintarBotones(); cargarTabla();
  });
  const bd = $('#btn-dups');
  if(bd) bd.addEventListener('click', () => {
    state.dups = !state.dups; state.estado = ''; state.mios = false;
    $('#f-estado').value = '';
    pintarBotones(); cargarTabla();
  });
  pintarBotones();
}

function pintarBotones(){
  $('#ebtns').querySelectorAll('.ebtn[data-estado]').forEach(b => {
    b.classList.toggle('active', b.dataset.estado === state.estado && !state.dups && !state.mios);
  });
  const m = $('#btn-mios'); if(m) m.classList.toggle('active', state.mios);
  const bd = $('#btn-dups'); if(bd) bd.classList.toggle('active', state.dups);
}

function pintarKpis(){
  const k = $('#kpi-sin-acciones'); if(k) k.classList.toggle('active', state.sinAcciones);
  const a = $('#kpi-sin-asignar'); if(a) a.classList.toggle('active', $('#f-tecnico').value === '__sin__');
}

async function cargarTecnicos(){
  // técnicos presentes en las consultas
  const r = await fetch('/api/consultas'); const d = await r.json();
  const set = [...new Set(d.consultas.map(x=>x.tecnico).filter(Boolean))].sort();
  const sel = $('#f-tecnico');
  set.forEach(v => sel.add(new Option(v, v)));
}

function badge(g, estado){ return `<span class="badge g-${g}">${escapeHtml(estado)||'—'}</span>`; }

async function cargarTabla(){
  const p = new URLSearchParams();
  if($('#q').value) p.set('q',$('#q').value);
  if(state.estado) p.set('estado',state.estado);
  if($('#f-tecnico').value) p.set('tecnico',$('#f-tecnico').value);
  if(state.mios) p.set('mios','1');
  if(state.dups) p.set('dups','1');
  if(state.sinAcciones) p.set('sin_acciones','1');
  if($('#f-accion').value) p.set('tipo_accion',$('#f-accion').value);
  if($('#f-departamento').value) p.set('departamento',$('#f-departamento').value);
  if($('#f-linea').value) p.set('linea',$('#f-linea').value);
  if($('#f-programa').value) p.set('programa',$('#f-programa').value);
  if($('#f-sector').value) p.set('sector',$('#f-sector').value);
  const r = await fetch('/api/consultas?'+p); const d = await r.json();
  ROWS = d.consultas;
  state.pagina = 1;
  $('#cont').textContent = d.total + ' consulta' + (d.total===1?'':'s');
  renderPagina();
}

function filaHTML(c){
  const dup = c.es_duplicado ? '<span class="dup">DUP</span>' : '';
  const acc = (state.dups && ROL === 'coordinador')
    ? `<button class="btn sm danger" onclick="event.stopPropagation();borrarConsulta(${c.id},this)">Eliminar</button>`
    : c.n_acciones;
  return `
    <tr onclick="location.href='/consulta/${c.id}'">
      <td>${escapeHtml(c.fecha_recepcion)||'—'}<div class="cod">${escapeHtml(c.codigo)}</div></td>
      <td><span class="nom">${escapeHtml(c.nombre)||'—'}</span><div class="cod">${escapeHtml(c.cuit)}${dup}</div></td>
      <td>${escapeHtml(c.localidad)||'—'}</td>
      <td>${c.sector?`<span class="chip">${escapeHtml(c.sector)}</span>`:'—'}</td>
      <td>${escapeHtml(c.monto)}</td>
      <td>${escapeHtml(c.linea)||'—'}</td>
      <td>${c.tecnico?escapeHtml(c.tecnico):'<span class="muted">sin asignar</span>'}</td>
      <td>${badge(c.grupo,c.estado)}</td>
      <td style="text-align:center">${acc}</td>
    </tr>`;
}

async function borrarConsulta(id, btn){
  const tr = btn.closest('tr');
  const nombre = tr.querySelector('.nom')?.textContent || 'esta consulta';
  if(!confirm('¿Eliminar la consulta de ' + nombre + '?\nEsta acción no se puede deshacer.')) return;
  const r = await fetch('/api/consultas/' + id, { method: 'DELETE' });
  if(r.ok){ await cargarResumen(); await cargarTabla(); }
  else alert('No se pudo eliminar (requiere rol coordinador).');
}

function renderPagina(){
  const total = ROWS.length;
  $('#empty').style.display = total ? 'none':'block';
  const pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(state.pagina > pages) state.pagina = pages;
  const start = (state.pagina-1)*PAGE_SIZE;
  $('#tbody').innerHTML = ROWS.slice(start, start+PAGE_SIZE).map(filaHTML).join('');
  const pg = $('#pager');
  if(total > PAGE_SIZE){
    pg.style.display = 'flex';
    pg.innerHTML = `
      <span class="info">Mostrando ${start+1}–${Math.min(start+PAGE_SIZE,total)} de ${total}</span>
      <span class="ctrls">
        <button class="btn sm" id="pg-prev" ${state.pagina<=1?'disabled':''}>← Anterior</button>
        <span class="pg">Página ${state.pagina} / ${pages}</span>
        <button class="btn sm" id="pg-next" ${state.pagina>=pages?'disabled':''}>Siguiente →</button>
      </span>`;
    $('#pg-prev').onclick = ()=>{ if(state.pagina>1){ state.pagina--; renderPagina(); window.scrollTo(0,0);} };
    $('#pg-next').onclick = ()=>{ if(state.pagina<pages){ state.pagina++; renderPagina(); window.scrollTo(0,0);} };
  } else {
    pg.style.display = 'none';
  }
}

$('#q').addEventListener('input', ()=>{clearTimeout(TIMER);TIMER=setTimeout(cargarTabla,250)});
$('#f-tecnico').addEventListener('change', ()=>{ pintarKpis(); cargarTabla(); });
$('#f-accion').addEventListener('change', cargarTabla);
$('#f-departamento').addEventListener('change', cargarTabla);
$('#f-linea').addEventListener('change', cargarTabla);
$('#f-programa').addEventListener('change', cargarTabla);
$('#f-sector').addEventListener('change', cargarTabla);
$('#f-estado').addEventListener('change', () => {
  state.estado = $('#f-estado').value; state.dups = false;
  pintarBotones(); cargarTabla();
});

(async function(){
  await cargarMeta(); await cargarCatalogos(); await cargarTecnicos();
  await cargarResumen(); await cargarTabla();
})();
</script>
{% endblock %}
