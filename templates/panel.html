<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel · Consultas SDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/panel.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">Consultas SDE<small>Seguimiento — UEP Santiago del Estero</small></div>
    <nav>
      <a href="/panel" class="active">Panel</a>
      <a href="/informe">Informe</a>
    </nav>
    <div class="spacer"></div>
    <div class="user">
      <span>{{ usuario.nombre }}</span>
      <span class="rol">{{ usuario.rol }}</span>
      <a href="/logout">Salir</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kpis" id="kpis"></div>

    <div class="estado-btns" id="ebtns"></div>

    <div class="filtros">
      <input type="search" id="q" placeholder="Buscar por nombre o CUIT…">
      <select id="f-tecnico"><option value="">Todos los técnicos</option><option value="__sin__">— Sin asignar</option></select>
      <span class="muted" id="cont"></span>
    </div>

    <div class="tabla-wrap card">
      <table>
        <thead><tr>
          <th>Recepción</th><th>Solicitante</th><th>Localidad</th><th>Sector</th>
          <th>Monto</th><th>Línea</th><th>Técnico</th><th>Estado</th><th>Acc.</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No hay consultas para este filtro.</div>
      <div class="pager" id="pager" style="display:none"></div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const ROL = "{{ usuario.rol }}";
let TIMER = null;
const PAGE_SIZE = 60;
const GCOLOR = { INICIAL:'#2f6fd0', EN_GESTION:'#6c4bd0', EN_SEDE:'#1a9e57', INACTIVAS:'#8891a8' };
const state = { estado: '', mios: false, dups: false, pagina: 1 };
let ROWS = [];

async function cargarResumen(){
  const r = await fetch('/api/informe'); const d = await r.json();
  $('#kpis').innerHTML = `
    <div class="kpi card"><div class="n">${d.total}</div><div class="l">Total consultas</div></div>
    <div class="kpi card accent"><div class="n">${d.activas}</div><div class="l">Activas</div></div>
    <div class="kpi card"><div class="n">${d.sin_asignar}</div><div class="l">Sin asignar</div></div>
    <div class="kpi card"><div class="n">${d.sin_acciones}</div><div class="l">Sin acciones</div></div>
    <div class="kpi card"><div class="n">${d.nuevas_semana}</div><div class="l">Nuevas (7 días)</div></div>`;

  // botones dinámicos: uno por cada estado que exista en los datos (se crean solos)
  let botones = `<button class="ebtn" data-estado=""><span>Todas</span><span class="cnt">${d.total}</span></button>`;
  d.estados.forEach(e => {
    botones += `<button class="ebtn" data-estado="${e.estado}">
      <span class="dot" style="background:${GCOLOR[e.grupo]||'#8891a8'}"></span>
      <span>${e.estado}</span><span class="cnt">${e.n}</span></button>`;
  });
  botones += `<button class="ebtn mios" id="btn-mios">Mis casos</button>`;
  if(d.duplicados > 0)
    botones += `<button class="ebtn dups" id="btn-dups">⚠ Duplicados <span class="cnt">${d.duplicados}</span></button>`;
  $('#ebtns').innerHTML = botones;

  $('#ebtns').querySelectorAll('.ebtn[data-estado]').forEach(b => {
    b.addEventListener('click', () => {
      state.estado = b.dataset.estado; state.dups = false; pintarBotones(); cargarTabla();
    });
  });
  $('#btn-mios').addEventListener('click', () => {
    state.mios = !state.mios; state.dups = false; pintarBotones(); cargarTabla();
  });
  const bd = $('#btn-dups');
  if(bd) bd.addEventListener('click', () => {
    state.dups = !state.dups; state.estado = ''; state.mios = false; pintarBotones(); cargarTabla();
  });
  pintarBotones();
}

function pintarBotones(){
  $('#ebtns').querySelectorAll('.ebtn[data-estado]').forEach(b => {
    b.classList.toggle('active', b.dataset.estado === state.estado && !state.dups && !state.mios);
  });
  const m = $('#btn-mios'); if(m) m.classList.toggle('active', state.mios);
  const bd = $('#btn-dups'); if(bd) bd.classList.toggle('active', state.dups);
}

async function cargarTecnicos(){
  // técnicos presentes en las consultas
  const r = await fetch('/api/consultas'); const d = await r.json();
  const set = [...new Set(d.consultas.map(x=>x.tecnico).filter(Boolean))].sort();
  const sel = $('#f-tecnico');
  set.forEach(v => sel.add(new Option(v, v)));
}

function badge(g, estado){ return `<span class="badge g-${g}">${estado||'—'}</span>`; }

async function cargarTabla(){
  const p = new URLSearchParams();
  if($('#q').value) p.set('q',$('#q').value);
  if(state.estado) p.set('estado',state.estado);
  if($('#f-tecnico').value) p.set('tecnico',$('#f-tecnico').value);
  if(state.mios) p.set('mios','1');
  if(state.dups) p.set('dups','1');
  const r = await fetch('/api/consultas?'+p); const d = await r.json();
  ROWS = d.consultas;
  state.pagina = 1;
  $('#cont').textContent = d.total + ' consulta' + (d.total===1?'':'s');
  renderPagina();
}

function filaHTML(c){
  const dup = c.es_duplicado ? '<span class="dup">DUP</span>' : '';
  const acc = (state.dups && ROL === 'coordinador')
    ? `<button class="btn sm danger" onclick="event.stopPropagation();borrarConsulta(${c.id},this)">Eliminar</button>`
    : c.n_acciones;
  return `
    <tr onclick="location.href='/consulta/${c.id}'">
      <td>${c.fecha_recepcion||'—'}<div class="cod">${c.codigo}</div></td>
      <td><span class="nom">${c.nombre||'—'}</span><div class="cod">${c.cuit||''}${dup}</div></td>
      <td>${c.localidad||'—'}</td>
      <td>${c.sector?`<span class="chip">${c.sector}</span>`:'—'}</td>
      <td>${c.monto}</td>
      <td>${c.linea||'—'}</td>
      <td>${c.tecnico||'<span class="muted">sin asignar</span>'}</td>
      <td>${badge(c.grupo,c.estado)}</td>
      <td style="text-align:center">${acc}</td>
    </tr>`;
}

async function borrarConsulta(id, btn){
  const tr = btn.closest('tr');
  const nombre = tr.querySelector('.nom')?.textContent || 'esta consulta';
  if(!confirm('¿Eliminar la consulta de ' + nombre + '?\nEsta acción no se puede deshacer.')) return;
  const r = await fetch('/api/consultas/' + id, { method: 'DELETE' });
  if(r.ok){ await cargarResumen(); await cargarTabla(); }
  else alert('No se pudo eliminar (requiere rol coordinador).');
}

function renderPagina(){
  const total = ROWS.length;
  $('#empty').style.display = total ? 'none':'block';
  const pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(state.pagina > pages) state.pagina = pages;
  const start = (state.pagina-1)*PAGE_SIZE;
  $('#tbody').innerHTML = ROWS.slice(start, start+PAGE_SIZE).map(filaHTML).join('');
  const pg = $('#pager');
  if(total > PAGE_SIZE){
    pg.style.display = 'flex';
    pg.innerHTML = `
      <span class="info">Mostrando ${start+1}–${Math.min(start+PAGE_SIZE,total)} de ${total}</span>
      <span class="ctrls">
        <button class="btn sm" id="pg-prev" ${state.pagina<=1?'disabled':''}>← Anterior</button>
        <span class="pg">Página ${state.pagina} / ${pages}</span>
        <button class="btn sm" id="pg-next" ${state.pagina>=pages?'disabled':''}>Siguiente →</button>
      </span>`;
    $('#pg-prev').onclick = ()=>{ if(state.pagina>1){ state.pagina--; renderPagina(); window.scrollTo(0,0);} };
    $('#pg-next').onclick = ()=>{ if(state.pagina<pages){ state.pagina++; renderPagina(); window.scrollTo(0,0);} };
  } else {
    pg.style.display = 'none';
  }
}

$('#q').addEventListener('input', ()=>{clearTimeout(TIMER);TIMER=setTimeout(cargarTabla,250)});
$('#f-tecnico').addEventListener('change', cargarTabla);

(async function(){ await cargarTecnicos(); await cargarResumen(); await cargarTabla(); })();
</script>
</body>
</html>
