{% extends "base.html" %}
{% block title %}Cambiar contraseña · Consultas SDE{% endblock %}
{% block body %}
{% include "_topbar.html" %}

  <div class="wrap" style="max-width:26.25rem">
    <a href="/panel" class="muted">&larr; Volver al panel</a>
    <div class="card" style="padding:1.75rem;margin-top:0.875rem">
      <h1 class="brand-font" style="font-size:1.25rem">Cambiar contraseña</h1>
      <div class="field"><label>Contraseña actual</label>
        <input id="p-actual" type="password" autocomplete="current-password"></div>
      <div class="field"><label>Contraseña nueva (mínimo 8 caracteres)</label>
        <input id="p-nueva" type="password" autocomplete="new-password"></div>
      <div class="field"><label>Repetir contraseña nueva</label>
        <input id="p-nueva2" type="password" autocomplete="new-password"></div>
      <button class="btn primary" id="guardar">Cambiar contraseña</button>
      <div id="msg" style="margin-top:0.75rem"></div>
    </div>
  </div>
{% endblock %}
{% block scripts %}
<script>
const $ = s => document.querySelector(s);
$('#guardar').addEventListener('click', async () => {
  const actual = $('#p-actual').value, nueva = $('#p-nueva').value, nueva2 = $('#p-nueva2').value;
  const msg = $('#msg');
  msg.className = ''; msg.textContent = '';
  if (!actual || !nueva) { msg.textContent = 'Completá los dos campos.'; msg.className = 'muted'; return; }
  if (nueva !== nueva2) { msg.textContent = 'Las contraseñas nuevas no coinciden.'; msg.className = 'muted'; return; }
  const r = await fetch('/api/usuarios/password', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({actual, nueva}),
  });
  if (r.ok) {
    msg.textContent = '✓ Contraseña actualizada.';
    $('#p-actual').value = ''; $('#p-nueva').value = ''; $('#p-nueva2').value = '';
  } else {
    const d = await r.json().catch(() => ({}));
    msg.textContent = d.detail || 'No se pudo cambiar la contraseña.';
    msg.className = 'muted';
  }
});
</script>
{% endblock %}
