<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cambiar contraseña · Consultas SDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/panel.css">
<script src="/static/js/util.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="brand">Consultas SDE<small>Seguimiento — UEP Santiago del Estero</small></div>
    <nav><a href="/panel">Panel</a><a href="/informe">Informe</a></nav>
    <div class="spacer"></div>
    <div class="user"><span>{{ usuario.nombre }}</span><span class="rol">{{ usuario.rol }}</span><a href="/logout">Salir</a></div>
  </div>

  <div class="wrap" style="max-width:420px">
    <a href="/panel" class="muted">&larr; Volver al panel</a>
    <div class="card" style="padding:28px;margin-top:14px">
      <h1 style="font-size:20px">Cambiar contraseña</h1>
      <div class="field"><label>Contraseña actual</label>
        <input id="p-actual" type="password" autocomplete="current-password"></div>
      <div class="field"><label>Contraseña nueva (mínimo 8 caracteres)</label>
        <input id="p-nueva" type="password" autocomplete="new-password"></div>
      <div class="field"><label>Repetir contraseña nueva</label>
        <input id="p-nueva2" type="password" autocomplete="new-password"></div>
      <button class="btn primary" id="guardar">Cambiar contraseña</button>
      <div id="msg" style="margin-top:12px"></div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
$('#guardar').addEventListener('click', async () => {
  const actual = $('#p-actual').value, nueva = $('#p-nueva').value, nueva2 = $('#p-nueva2').value;
  const msg = $('#msg');
  msg.className = ''; msg.textContent = '';
  if (!actual || !nueva) { msg.textContent = 'Completá los dos campos.'; msg.className = 'muted'; return; }
  if (nueva !== nueva2) { msg.textContent = 'Las contraseñas nuevas no coinciden.'; msg.className = 'muted'; return; }
  const r = await fetch('/api/usuarios/password', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({actual, nueva}),
  });
  if (r.ok) {
    msg.textContent = '✓ Contraseña actualizada.';
    $('#p-actual').value = ''; $('#p-nueva').value = ''; $('#p-nueva2').value = '';
  } else {
    const d = await r.json().catch(() => ({}));
    msg.textContent = d.detail || 'No se pudo cambiar la contraseña.';
    msg.className = 'muted';
  }
});
</script>
</body>
</html>
